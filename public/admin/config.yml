backend:
  name: git-gateway
  branch: master

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: "config"
    label: "Global Config"
    delete: false
    editor:
      preview: false
    files:
      - name: "siteConfig"
        label: "Site Configuration"
        file: "src/content/siteConfig.json"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - label: "Hero Banner"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge Text", name: "badge", widget: "string" }
              - { label: "Main Title", name: "titleMain", widget: "string" }
              - { label: "Gradient Title", name: "titleGradient", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Contact Info"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "FBR Status", name: "fbrStatus", widget: "string" }
          - label: "Social Links"
            name: "socials"
            widget: "object"
            fields:
              - { label: "GitHub", name: "github", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }
              - { label: "Twitter", name: "twitter", widget: "string" }

  - name: "projects_data"
    label: "Project Management"
    delete: false
    editor:
      preview: false
    files:
      - name: "projects"
        label: "All Projects"
        file: "src/content/projects.json"
        fields:
          - label: "Projects List"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Tags", name: "tags", widget: "list" }
              - {
                  label: "Category",
                  name: "category",
                  widget: "select",
                  options: ["ai", "web", "app"],
                }
              - {
                  label: "Size",
                  name: "size",
                  widget: "select",
                  options: ["small", "large"],
                }
              - { label: "Badge", name: "badge", widget: "string" }
              - { label: "GitHub Link", name: "github", widget: "string", required: false }
              - { label: "Live Link", name: "live", widget: "string", required: false }

  - name: "services_data"
    label: "Services"
    delete: false
    files:
      - name: "services"
        label: "All Services"
        file: "src/content/services.json"
        fields:
          - label: "Services List"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Icon Name", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Trust Note", name: "trust", widget: "string" }
              - {
                  label: "Color",
                  name: "color",
                  widget: "select",
                  options: ["blue", "teal", "gold", "purple"],
                }

  - name: "testimonials_data"
    label: "Testimonials"
    delete: false
    files:
      - name: "testimonials"
        label: "All Testimonials"
        file: "src/content/testimonials.json"
        fields:
          - label: "Testimonials List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Avatar", name: "avatar", widget: "image" }

  - name: "stats_data"
    label: "Business Stats"
    delete: false
    files:
      - name: "site_stats"
        label: "Main Stats"
        file: "src/content/stats.json"
        fields:
          - label: "Stats List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "number" }
              - { label: "Suffix", name: "suffix", widget: "string", required: false }

  - name: "process_data"
    label: "Our Process"
    delete: false
    files:
      - name: "process_steps"
        label: "Roadmap Steps"
        file: "src/content/processSteps.json"
        fields:
          - label: "Steps List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Step Number", name: "step", widget: "number" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
